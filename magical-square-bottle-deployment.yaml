# To deploy: kubectl create -f magiclsquare-hello-world-deployment.yaml
# Access it with the API as a proxy:
# $ kubectl proxy
# Then in you browser: http://localhost:8001/api/v1/namespaces/default/services/magiclsquare:/proxy/#!/

apiVersion: v1
kind: Service
metadata:
  name: magiclsquare
spec:
  type: LoadBalancer
  ports:
  - port: 8475
    targetPort: 8080
    nodePort: 30024
  selector:
    app: magiclsquare

apiVersion: apps/v1
kind: Deployment
metadata:
  name: magiclsquare
spec:
  selector:
    matchLabels:
      app: magiclsquare
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: magiclsquare
    spec:
      containers:
      - image: localhost:5000/magicalodd:v1.2
        name: magiclsquare
        ports:
        - containerPort: 80
          name: web
